<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반도체 커플링 맵 - 조비스</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: #fff; font-family: sans-serif; overflow: hidden; }
        #canvas { width: 100vw; height: 100vh; }
        .node { stroke: #fff; stroke-width: 1.5px; }
        .link { stroke: #555; stroke-opacity: 0.6; marker-end: url(#arrowhead); }
        .label { font-size: 12px; fill: #eee; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        #tooltip { position: absolute; padding: 10px; background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 5px; font-size: 12px; visibility: hidden; z-index: 10; pointer-events: none; max-width: 300px; }
        .title { position: absolute; top: 20px; left: 20px; font-size: 20px; font-weight: bold; border-left: 4px solid #00AA00; padding-left: 10px; }
    </style>
</head>
<body>
    <div class="title">조비스 반도체 공급망 커플링 맵 (1차)</div>
    <div id="tooltip"></div>
    <svg id="canvas"></svg>

    <script>
        const data = {
  "links": [
    { "from": "SK Hynix", "to": "Nvidia", "reason": "Primary supplier of HBM3E and HBM4" },
    { "from": "Samsung Electronics", "to": "Nvidia", "reason": "HBM3E/HBM4/GDDR7/SSD supply" },
    { "from": "Samsung Electronics", "to": "Google", "reason": "HBM4 for next-gen TPU" },
    { "from": "SK Hynix", "to": "Microsoft", "reason": "Exclusive HBM3E for Maia 200" },
    { "from": "SK Hynix", "to": "Google", "reason": "HBM3E for Ironwood TPU" },
    { "from": "Samsung Electronics", "to": "Apple", "reason": "DRAM for iPhone 17/18" },
    { "from": "Hana Micron", "to": "SK Hynix", "reason": "Strategic OSAT partner" },
    { "from": "Hanmi Semiconductor", "to": "SK Hynix", "reason": "TC Bonder equipment" },
    { "from": "AP Systems", "to": "Samsung Electronics", "reason": "CLT/Laser equipment" },
    { "from": "Exicon", "to": "Samsung Electronics", "reason": "Burn-in testers (2nd vendor)" },
    { "from": "DI (디아이)", "to": "Samsung Electronics", "reason": "Burn-in testers (1st vendor)" },
    { "from": "DIIT (디아이티)", "to": "SK Hynix", "reason": "Laser annealing equipment" },
    { "from": "EO Technics", "to": "Samsung Electronics", "reason": "Laser repair/cutting equipment" },
    { "from": "Shimtech", "to": "Nvidia", "reason": "SOCAMM2 substrates" },
    { "from": "Gigavis", "to": "Samsung Electronics", "reason": "Optical inspection for FC-BGA" },
    { "from": "Samsung Electro-Mechanics", "to": "Nvidia", "reason": "FC-BGA for NVLink" },
    { "from": "Doosan (Electronic)", "to": "Nvidia", "reason": "Core materials (CCL)" },
    { "from": "Fadu", "to": "SpaceX", "reason": "SSD controllers for Starlink" },
    { "from": "Unitest", "to": "SK Hynix", "reason": "HBM testers" },
    { "from": "ISTE (아이에스티이)", "to": "SK Hynix", "reason": "Automation equipment" },
    { "from": "Chemtronics", "to": "Samsung Electronics", "reason": "Glass substrates/EUV chemicals" },
    { "from": "V-M (브이엠)", "to": "SK Hynix", "reason": "Etching equipment" },
    { "from": "SAMT (에스에이엠티)", "to": "Samsung Electronics", "reason": "Intermediate distribution" },
    { "from": "SBB Tech", "to": "TSMC", "reason": "Precision bearings" }
  ]
};

        const nodes = Array.from(new Set(data.links.flatMap(l => [l.from, l.to]))).map(id => ({ id }));
        const links = data.links.map(l => ({ source: l.from, target: l.to, reason: l.reason }));

        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#canvas")
            .attr("width", width)
            .attr("height", height);

        // Define arrow head
        svg.append("defs").append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "-0 -5 10 10")
            .attr("refX", 20)
            .attr("refY", 0)
            .attr("orient", "auto")
            .attr("markerWidth", 6)
            .attr("markerHeight", 6)
            .attr("xoverflow", "visible")
            .append("svg:path")
            .attr("d", "M 0,-5 L 10 ,0 L 0,5")
            .attr("fill", "#888")
            .style("stroke","none");

        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(50));

        const link = svg.append("g")
            .attr("class", "links")
            .selectAll("line")
            .data(links)
            .enter().append("line")
            .attr("class", "link")
            .attr("stroke-width", 2);

        const node = svg.append("g")
            .attr("class", "nodes")
            .selectAll("circle")
            .data(nodes)
            .enter().append("circle")
            .attr("class", "node")
            .attr("r", d => ["Samsung Electronics", "SK Hynix", "Nvidia"].includes(d.id) ? 12 : 8)
            .attr("fill", d => ["Samsung Electronics", "SK Hynix", "Nvidia"].includes(d.id) ? "#00AA00" : "#0066CC")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended))
            .on("mouseover", (event, d) => {
                const connectedReasons = links.filter(l => l.source.id === d.id || l.target.id === d.id).map(l => l.reason);
                d3.select("#tooltip")
                    .style("visibility", "visible")
                    .html(`<strong>${d.id}</strong><br>${connectedReasons.join('<br>')}`);
            })
            .on("mousemove", (event) => {
                d3.select("#tooltip")
                    .style("top", (event.pageY + 10) + "px")
                    .style("left", (event.pageX + 10) + "px");
            })
            .on("mouseout", () => d3.select("#tooltip").style("visibility", "hidden"));

        const label = svg.append("g")
            .attr("class", "labels")
            .selectAll("text")
            .data(nodes)
            .enter().append("text")
            .attr("class", "label")
            .text(d => d.id)
            .attr("dx", 15)
            .attr("dy", 4);

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);

            label
                .attr("x", d => d.x)
                .attr("y", d => d.y);
        });

        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }

        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }

        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }
    </script>
</body>
</html>
