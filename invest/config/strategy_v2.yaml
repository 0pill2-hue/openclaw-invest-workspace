version: 2
owner: "주인님"
updated_at: "2026-02-13"

portfolio:
  preferred_positions: [1, 6]
  max_positions: 8
  cash_default_target: 0.0
  cash_risk_off_allowed: 1.0

market_scope:
  primary: ["KR"]
  secondary:
    enabled: true
    markets: ["US"]
    condition: "turnaround + supercycle_early"

execution:
  frequent_trading_disliked: true
  style: "buy_strength_hold_long"
  objective: "maximize_return"
  sell_policy: "regime_break_or_fundamental_damage"

liquidity_tiers:
  basis: "avg_turnover_20d_krw"
  tiers:
    L1: {min: 30000000000, buy: true, min_hold_days: 0, cooldown_days: 0, tranches: 1, slippage: 0.005}
    L2: {min: 10000000000, buy: true, min_hold_days: 3, cooldown_days: 0, tranches: 2, slippage: 0.010}
    L3: {min: 3000000000,  buy: true, min_hold_days: 7, cooldown_days: 5, tranches: 3, slippage: 0.015}
    L4: {min: 0,           buy: false, min_hold_days: 0, cooldown_days: 0, tranches: 0, slippage: 0.025}

scoring:
  performance_weights:
    return: 0.70
    risk_efficiency: 0.30
  qualitative:
    enabled: true
    pillars: ["supercycle", "business_model", "governance", "durability"]
  penalty:
    no_bm_no_fundamental: -30
    meme_global_exception: true

seasonality:
  korean_market_half_cycle:
    H1_mode: "risk_on"
    H2_mode: "risk_off_tilt"
    H2_defense_strength: "low"

reporting:
  morning_hot_issues_priority: "hot_first"

risk:
  target_max_drawdown: -0.30
  annual_return_target: 1.00
  crisis_avoidance:
    enabled: true
    action: "cash_100"
