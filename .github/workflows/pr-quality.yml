name: pr-quality

on:
  pull_request:
    branches: [ main ]

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Secret-pattern quick scan
        run: |
          if grep -R -nE "(ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,})" .; then
            echo "Potential secret detected"
            exit 1
          fi
      - name: Python compile smoke
        run: |
          python -m compileall invest/scripts invest/backtest_compare.py
