<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw Operations Dashboard</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>운영 대시보드</h1>
        <p class="muted">localhost-only · local files/DB only · no model calls</p>
      </div>
      <div class="runhint">run: <code>python scripts/dashboard/server.py</code></div>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab is-active" data-tab="ops">운영보고서</button>
      <button class="tab" data-tab="stage1">Stage1</button>
      <button class="tab" data-tab="stage2">Stage2</button>
      <button class="tab" data-tab="stage3">Stage3</button>
    </nav>

    <section class="meta-row">
      <div class="meta-chip" id="refreshStatus">대기 중</div>
      <div class="meta-chip" id="sourceStatus">로컬 데이터 소스만 사용</div>
    </section>

    <main>
      <section class="panel is-active" id="panel-ops">
        <div class="grid-two">
          <section class="card stack" id="ops-summary"></section>
          <section class="card stack" id="brains-summary"></section>
        </div>
        <section class="grid-three task-groups" id="task-groups"></section>
        <section class="grid-three" id="guard-cards"></section>
      </section>

      <section class="panel" id="panel-stage1">
        <section class="card stack" id="stage1-summary"></section>
        <section class="card-grid" id="stage1-cards"></section>
      </section>

      <section class="panel" id="panel-stage2">
        <section class="card stack" id="stage2-summary"></section>
        <section class="card-grid" id="stage2-cards"></section>
      </section>

      <section class="panel" id="panel-stage3">
        <section class="card placeholder">
          <h2>Stage3</h2>
          <p>준비중</p>
          <p class="muted">현재 버전은 Stage1/Stage2/운영보고서만 로컬 데이터로 연결합니다.</p>
        </section>
      </section>
    </main>
  </div>

  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="drawer-panel">
      <div class="drawer-head">
        <h2 id="drawerTitle">상세</h2>
        <button class="ghost" id="drawerClose">닫기</button>
      </div>
      <div class="drawer-body" id="drawerBody"></div>
    </div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
